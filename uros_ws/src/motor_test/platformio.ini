; Standalone motor Modbus test — no micro-ROS
; Three environments for isolated motor validation.
;
; Flash one phase at a time:
;   pio run -e left_only  -t upload --upload-port /dev/ttyESP32
;   pio run -e right_only -t upload --upload-port /dev/ttyESP32
;   pio run -e both       -t upload --upload-port /dev/ttyESP32

[env]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200
upload_flags =
    --before=no_reset

[env:left_only]
build_flags = -DTEST_PHASE=1

[env:right_only]
build_flags = -DTEST_PHASE=2

[env:both]
build_flags = -DTEST_PHASE=3

[env:diag]
build_flags = -DTEST_PHASE=4

[env:dirprobe]
build_flags = -DTEST_PHASE=5
