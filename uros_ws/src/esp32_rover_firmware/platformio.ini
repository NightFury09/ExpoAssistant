; PlatformIO Project Configuration
; ESP32 micro-ROS Rover Firmware
; Flash with: pio run --target upload

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; micro-ROS Arduino library (prebuilt for ESP32, Humble)
; RMCS2303drive is bundled locally in lib/RMCS2303drive/ (downloaded from Robokits)
lib_deps =
    https://github.com/micro-ROS/micro_ros_arduino

; Decrease upload speed for more reliable connection
upload_speed = 115200
monitor_speed = 115200

upload_flags =
    --before=no_reset

; Partition scheme must be large enough for micro-ROS
board_build.partitions = huge_app.csv

build_flags =
    -L .pio/libdeps/esp32dev/micro_ros_arduino/src/esp32
    -l microros
